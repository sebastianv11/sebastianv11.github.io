<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetFio - Política de Privacidad</title>
  <meta
    name="description"
    content="Términos y Condiciones y Política de Privacidad de la aplicación PetFio."
  />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    header {
      background: #222;
      color: #fff;
      padding: 20px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .actions {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #e2ba42;
      color: #111;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: #333;
      color: #fff;
    }

    .btn-secondary:hover {
      opacity: 0.9;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
    }

    footer {
      text-align: center;
      padding: 20px 16px 30px;
      color: #666;
      font-size: 13px;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>PetFio</h1>
    <p>Política de Privacidad y Términos y Condiciones</p>
  </header>

  <main class="container">
    <section class="card">
      <div class="actions">
        <a
          class="btn btn-primary"
          href="./PetFio-Terminos-y-Privacidad.pdf"
          target="_blank"
          rel="noopener noreferrer"
        >
          Abrir PDF
        </a>

        <a
          class="btn btn-secondary"
          href="./PetFio-Terminos-y-Privacidad.pdf"
          download
        >
          Descargar PDF
        </a>
      </div>

      <iframe
        src="./PetFio-Terminos-y-Privacidad.pdf"
        title="Política de Privacidad PetFio"
      ></iframe>

      <p class="note">
        Si el visor no carga en tu navegador, usa el botón <strong>Abrir PDF</strong>.
      </p>
    </section>
  </main>

  <footer>
    © 2026 PetFio · Desarrollado por Sebastian Vargas
  </footer>
</body>
</html>
